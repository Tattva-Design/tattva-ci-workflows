name: Auto Tag on PR Merge

on:
  pull_request:
    types: [closed]
    branches:
      - master
  workflow_call:
    inputs:
      git-user-name:
        description: 'Git user name for tagging'
        required: false
        type: string
        default: 'github-actions'
      git-user-email:
        description: 'Git user email for tagging'
        required: false
        type: string
        default: 'github-actions@github.com'

jobs:
  create-tag:
    if: github.event.pull_request == null || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version from composer.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./composer.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          git fetch --tags
          if git rev-parse "refs/tags/${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.get_version.outputs.version }} already exists. Skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config --global user.name "${{ inputs.git-user-name }}"
          git config --global user.email "${{ inputs.git-user-email }}"
          git tag ${{ steps.get_version.outputs.version }}
          git push origin ${{ steps.get_version.outputs.version }}
