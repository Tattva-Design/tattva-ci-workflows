name: Auto Tag on PR Merge

on:
  pull_request:
    types: [closed]
    branches:
      - master
  workflow_call:
    inputs:
      git-user-name:
        description: 'Git user name for tagging'
        required: false
        type: string
        default: 'github-actions'
      git-user-email:
        description: 'Git user email for tagging'
        required: false
        type: string
        default: 'github-actions@github.com'

jobs:
  create-tag:
    if: github.event.pull_request == null || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "${{ inputs.git-user-name }}"
          git config --global user.email "${{ inputs.git-user-email }}"

      - name: Bump version in composer.json
        id: get_version
        run: |
          NEW_VERSION=$(node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('./composer.json', 'utf8'));
            const parts = data.version.split('.');
            parts[2] = (parseInt(parts[2], 10) || 0) + 1;
            data.version = parts.join('.');
            fs.writeFileSync('./composer.json', JSON.stringify(data, null, 4) + '\n');
          ")
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          git fetch --tags
          if git rev-parse "refs/tags/${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.get_version.outputs.version }} already exists. Skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit, push version bump and tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git add composer.json
          git commit -m "chore(release): bump version to ${{ steps.get_version.outputs.version }} [skip ci]"
          git tag ${{ steps.get_version.outputs.version }}
          git push origin HEAD:master --tags
