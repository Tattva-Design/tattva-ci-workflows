name: Node Version Update
description: Bump a Node package version with npm, create a git tag, and push both.

inputs:
  working-directory:
    description: Directory containing the package.json file.
    required: false
    default: .
  bump-type:
    description: Version increment to apply.
    required: false
    default: patch
  branch:
    description: Branch to push the version bump commit to.
    required: false
    default: master
  tag-prefix:
    description: Prefix used when creating the git tag.
    required: false
    default: v
  git-user-name:
    description: Git author name for the automated commit.
    required: false
    default: github-actions
  git-user-email:
    description: Git author email for the automated commit.
    required: false
    default: github-actions@github.com
  commit-message:
    description: Commit message template. Use %s as the version placeholder.
    required: false
    default: 'chore(release): bump version to %s [skip ci]'

outputs:
  old-version:
    description: Previous package version.
    value: ${{ steps.version.outputs.old-version }}
  new-version:
    description: Updated package version.
    value: ${{ steps.version.outputs.new-version }}
  tag:
    description: Created git tag.
    value: ${{ steps.version.outputs.tag }}

runs:
  using: composite
  steps:
    - name: Read current version
      id: current
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        VERSION=$(node -p "require('./package.json').version")
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Configure git author
      shell: bash
      run: |
        git config user.name "${{ inputs.git-user-name }}"
        git config user.email "${{ inputs.git-user-email }}"

    - name: Bump version
      id: version
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail

        OLD_VERSION="${{ steps.current.outputs.version }}"
        NEW_VERSION=$(npm version "${{ inputs.bump-type }}" -m "${{ inputs.commit-message }}")
        NEW_VERSION="${NEW_VERSION#v}"
        TAG="${{ inputs.tag-prefix }}${NEW_VERSION}"

        echo "old-version=$OLD_VERSION" >> "$GITHUB_OUTPUT"
        echo "new-version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"

    - name: Push commit and tag
      shell: bash
      run: |
        set -euo pipefail
        git push origin "HEAD:${{ inputs.branch }}" --follow-tags
